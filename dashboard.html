<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อนักเรียน - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> 
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #pdf-container { position: absolute; left: -9999px; top: -9999px; width: 800px; background: white; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800 relative">

    <aside class="w-64 bg-blue-950 text-white flex flex-col shadow-2xl z-20 relative transition-all">
        <div class="p-6 border-b border-blue-900/50 flex flex-col items-center">
            <div class="w-20 h-20 rounded-full border-4 border-teal-500 overflow-hidden mb-3 shadow-lg">
                <img id="sidebarPhoto" src="" class="w-full h-full object-cover">
            </div>
            <h2 class="text-lg font-bold" id="sidebarName">...</h2>
            <p class="text-xs text-teal-300 bg-teal-900/50 px-3 py-1 rounded-full mt-1" id="sidebarRole">...</p>
        </div>

        <div id="adminFilterContainer" class="p-4 border-b border-blue-900/50 hidden">
            <label class="text-xs text-blue-300 font-semibold mb-1 block"><i class="fa-solid fa-filter"></i> มุมมองข้อมูล (Admin)</label>
            <select id="adminGradeSelect" onchange="changeAdminView()" class="w-full bg-blue-900 text-white border-none rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-teal-500">
                <option value="All">ดูภาพรวมทุกชั้น</option>
                <option value="ป.1">เฉพาะ ป.1</option>
                <option value="ป.2">เฉพาะ ป.2</option>
                <option value="ป.3">เฉพาะ ป.3</option>
                <option value="ป.4">เฉพาะ ป.4</option>
                <option value="ป.5">เฉพาะ ป.5</option>
                <option value="ป.6">เฉพาะ ป.6</option>
            </select>
        </div>
        
        <div class="p-4 overflow-y-auto">
            <nav class="space-y-1" id="nav-menu">
                <button onclick="switchTab('checkin', this)" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 bg-blue-900/50 text-teal-300 rounded-xl transition font-medium border-l-4 border-teal-400">
                    <i class="fa-solid fa-qrcode w-5 text-center"></i><span>ระบบเช็คชื่อ</span>
                </button>
                <button onclick="switchTab('verify', this)" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 text-slate-300 hover:bg-blue-900/30 hover:text-white rounded-xl transition font-medium border-l-4 border-transparent">
                    <i class="fa-solid fa-list-check w-5 text-center"></i><span id="navVerifyText">ตรวจสอบรายชื่อ</span>
                </button>
                <button onclick="switchTab('history', this)" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 text-slate-300 hover:bg-blue-900/30 hover:text-white rounded-xl transition font-medium border-l-4 border-transparent">
                    <i class="fa-solid fa-clock-rotate-left w-5 text-center"></i><span>ประวัติย้อนหลัง</span>
                </button>
                <button onclick="switchTab('random', this)" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 text-orange-400 hover:bg-orange-500/20 hover:text-orange-300 rounded-xl transition font-medium border-l-4 border-transparent">
                    <i class="fa-solid fa-dice w-5 text-center"></i><span>สุ่มชื่อนักเรียน</span>
                </button>
                <button onclick="switchTab('export', this)" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 text-slate-300 hover:bg-blue-900/30 hover:text-white rounded-xl transition font-medium border-l-4 border-transparent">
                    <i class="fa-solid fa-file-pdf w-5 text-center"></i><span>ส่งออกรายงาน PDF</span>
                </button>
            </nav>
        </div>
        <div class="mt-auto p-4 border-t border-blue-900/50">
            <button onclick="logout()" class="w-full bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white py-2 rounded-lg transition text-sm font-semibold"><i class="fa-solid fa-right-from-bracket mr-2"></i>ออกจากระบบ</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto relative bg-slate-50 p-8">
        
        <section id="checkin" class="tab-content active max-w-3xl mx-auto">
            <h1 class="text-3xl font-bold text-blue-950 mb-2">สแกนรหัสเช็คชื่อ <span id="checkinContextBadge" class="text-lg bg-teal-100 text-teal-700 px-3 py-1 rounded-full ml-2 align-middle"></span></h1>
            <p class="text-slate-500 mb-8">ระบบป้องกันการเช็คชื่อข้ามชั้นเรียนและตรวจสอบการเข้าซ้ำอัตโนมัติ</p>
            
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-8 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-teal-400 to-blue-500"></div>
                <i class="fa-solid fa-barcode text-5xl text-slate-300 mb-4 block"></i>
                <input type="text" id="studentInput" autofocus
                    class="w-full max-w-md mx-auto text-center px-6 py-4 text-2xl font-bold border-2 border-slate-200 rounded-xl focus:ring-4 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition text-blue-950"
                    placeholder="กรอกรหัสนักเรียน...">
                <div id="checkinStatus" class="mt-4 font-medium h-6 text-sm"></div>
            </div>

            <div id="studentCard" class="hidden bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden transform transition-all">
                <div class="p-6 sm:p-8 flex flex-col sm:flex-row items-center sm:items-start gap-6">
                    <div class="w-32 h-32 rounded-full border-4 border-teal-50 shadow-md overflow-hidden bg-slate-100 flex-shrink-0 flex items-center justify-center">
                        <img id="studentPhotoCard" src="" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 text-center sm:text-left w-full">
                        <div id="statusBadge" class="inline-block px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full mb-2"></div>
                        <h2 id="studentName" class="text-2xl font-bold text-slate-800 mb-1">-</h2>
                        <p class="text-slate-500 font-medium mb-4">รหัส: <span id="studentIdDisplay" class="text-blue-600">-</span></p>
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                                <p class="text-slate-400 mb-1">ระดับชั้น</p><p id="studentGrade" class="font-bold text-slate-700">-</p>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                                <p class="text-slate-400 mb-1">เวลาเข้าเรียน</p><p id="studentTime" class="font-bold text-teal-600">-</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        </main>

    <div id="deleteModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center">
        </div>

    <script>
        // ==========================================
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbyUt_SCDKswaokUSdcDbvctpjFIEJqaNYpvqsTFr71evgAiZHUVzuo8nhN-bJehQZq4/exec'; // <<<<<<<
        // ==========================================

        if (!localStorage.getItem('isLoggedIn')) { window.location.href = 'index.html'; }

        // ตัวแปรข้อมูลผู้ใช้
        const tName = localStorage.getItem('tName');
        const tRole = localStorage.getItem('tRole');
        const tGrade = localStorage.getItem('tGrade');
        const tPhoto = localStorage.getItem('tPhoto');

        // ตัวแปร Data State
        let allRecords = []; 
        let rawGradeTotals = {};
        let activeGradeContext = tRole === 'Admin' ? 'All' : tGrade; // บริบทการมองเห็นข้อมูล
        let targetDeleteId = null;
        let todayChartObj = null;
        let historyChartObj = null;

        // --- ตั้งค่าหน้าจอตอนโหลด ---
        window.onload = () => {
            document.getElementById('sidebarName').textContent = tName;
            document.getElementById('sidebarRole').textContent = tRole === 'Admin' ? 'Administrator' : `ครูประจำชั้น ${tGrade}`;
            document.getElementById('sidebarPhoto').src = tPhoto;
            
            updateContextUI();

            if(tRole === 'Admin') {
                document.getElementById('adminFilterContainer').classList.remove('hidden');
            }
        }

        // --- อัปเดตข้อความบนจอให้ตรงกับชั้นเรียนที่ดูอยู่ ---
        function updateContextUI() {
            const contextText = activeGradeContext === 'All' ? 'ทุกระดับชั้น' : activeGradeContext;
            document.getElementById('checkinContextBadge').textContent = contextText;
            document.getElementById('navVerifyText').textContent = `ตรวจสอบรายชื่อ (${contextText})`;
            
            // ถ้าอยู่ในหน้า Dashboard แล้วมีการเปลี่ยน Filter ให้โหลดข้อมูลใหม่
            if(document.getElementById('verify').classList.contains('active') || document.getElementById('history').classList.contains('active')) {
                loadRecords();
            }
        }

        // --- Admin เปลี่ยนมุมมองชั้นเรียน ---
        function changeAdminView() {
            activeGradeContext = document.getElementById('adminGradeSelect').value;
            updateContextUI();
        }

        // --- ระบบเช็คชื่อ (ส่ง activeGradeContext ไปเช็คสิทธิ์) ---
        document.getElementById('studentInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const sid = this.value.trim();
                if (!sid) return;

                document.getElementById('checkinStatus').innerHTML = '<span class="text-blue-500"><i class="fa-solid fa-spinner fa-spin"></i> บันทึกข้อมูล...</span>';
                document.getElementById('studentCard').classList.add('hidden');

                // ส่ง allowedGrade ไปบอก Backend ด้วย ว่าครูคนนี้สแกนได้แค่เด็กชั้นไหน
                fetch(scriptUrl, { method: 'POST', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify({
                    action: 'checkin', 
                    studentId: sid, 
                    allowedGrade: activeGradeContext 
                })})
                .then(r => r.json())
                .then(data => {
                    const statusEl = document.getElementById('checkinStatus');
                    const badge = document.getElementById('statusBadge');
                    statusEl.innerHTML = ''; 
                    
                    if (data.status === 'success') {
                        badge.className = "inline-block px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full mb-2";
                        badge.innerHTML = '<i class="fa-solid fa-check-circle mr-1"></i> บันทึกสำเร็จ';
                        document.getElementById('studentPhotoCard').src = data.photoUrl || `https://ui-avatars.com/api/?name=${data.name}&background=0D9488&color=fff&size=128`; 
                        document.getElementById('studentName').textContent = data.name;
                        document.getElementById('studentIdDisplay').textContent = sid;
                        document.getElementById('studentGrade').textContent = data.grade;
                        document.getElementById('studentTime').textContent = new Date().toLocaleTimeString('th-TH');
                        document.getElementById('studentCard').classList.remove('hidden');
                        loadRecords(true); 
                    } 
                    else if (data.status === 'unauthorized') {
                        // แจ้งเตือนสแกนข้ามชั้น
                        badge.className = "inline-block px-3 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full mb-2";
                        badge.innerHTML = '<i class="fa-solid fa-ban mr-1"></i> สิทธิ์ไม่ถูกต้อง!';
                        document.getElementById('studentPhotoCard').src = `https://ui-avatars.com/api/?name=X&background=ef4444&color=fff&size=128`;
                        document.getElementById('studentName').textContent = "นักเรียนไม่ได้อยู่ในชั้นรับผิดชอบ";
                        document.getElementById('studentIdDisplay').textContent = sid;
                        document.getElementById('studentGrade').textContent = "-";
                        document.getElementById('studentTime').textContent = data.message; // ยืมช่องแสดง Error
                        document.getElementById('studentCard').classList.remove('hidden');
                    }
                    else if (data.status === 'duplicate') {
                        // ... โค้ด duplicate แบบเดิม ...
                    } else {
                        statusEl.innerHTML = `<span class="text-red-500 font-bold">❌ ${data.message}</span>`;
                    }
                    this.value = ''; 
                });
            }
        });

        // --- โหลดข้อมูล (กรองเฉพาะ activeGradeContext) ---
        function loadRecords(silent = false) {
            // ... (โค้ด loading หมุนติ้วเหมือนเดิม) ...

            fetch(scriptUrl, { method: 'POST', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify({action: 'getRecords'}) })
            .then(r => r.json())
            .then(data => {
                if(data.status === 'success') {
                    // กรองข้อมูลตารางให้ตรงกับระดับชั้นที่เลือก
                    let filteredRecords = data.records;
                    if(activeGradeContext !== 'All') {
                        filteredRecords = data.records.filter(r => r[4].startsWith(activeGradeContext));
                    }
                    allRecords = filteredRecords; // ยัดใส่ตัวแปรหลัก เพื่อให้หน้าประวัติและสุ่มดึงไปใช้ต่อ
                    
                    // ดึงยอดรวมนักเรียนจาก Backend ที่นับแยกชั้นมาให้
                    rawGradeTotals = data.gradeTotals;
                    let contextTotalCount = rawGradeTotals[activeGradeContext] || 0;

                    // นำ allRecords และ contextTotalCount ไปคำนวณและวาดตาราง/กราฟ ต่อไปตามโค้ดเดิม
                    // ... (ใช้ logic calculateStats และ render ตารางของไฟล์เดิมได้เลยครับ)
                }
            });
        }

        // ... (ฟังก์ชันอื่นๆ ที่เหลือเหมือนเดิม) ...
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
