<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ระบบเช็คชื่อนักเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="font-bold text-xl">📝 Check-in System</div>
                <div class="flex items-center space-x-4">
                    <span id="displayTeacherName" class="text-sm">ยินดีต้อนรับ, ครู...</span>
                    <button onclick="logout()" class="bg-blue-700 hover:bg-blue-800 px-3 py-1 rounded text-sm transition">ออกจากระบบ</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8 text-center">
            <h2 class="text-lg font-semibold text-slate-700 mb-4">สแกนหรือพิมพ์รหัสนักเรียนเพื่อเช็คชื่อ</h2>
            <input type="text" id="studentInput" autofocus
                class="w-full max-w-md mx-auto text-center px-4 py-3 text-xl border-2 border-blue-300 rounded-lg focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition"
                placeholder="กรอกรหัส 5 หลัก แล้วกด Enter">
            <p id="checkinStatus" class="mt-3 text-green-600 font-medium h-6"></p> </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-blue-500">
                <div class="text-slate-500 text-sm font-medium">นักเรียนทั้งหมด (ชั้นที่รับผิดชอบ)</div>
                <div class="text-3xl font-bold text-slate-800 mt-2">100 <span class="text-sm font-normal text-slate-500">คน</span></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-green-500">
                <div class="text-slate-500 text-sm font-medium">มาเรียนวันนี้</div>
                <div id="presentCount" class="text-3xl font-bold text-slate-800 mt-2">0 <span class="text-sm font-normal text-slate-500">คน</span></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-red-500">
                <div class="text-slate-500 text-sm font-medium">ขาดเรียน</div>
                <div id="absentCount" class="text-3xl font-bold text-slate-800 mt-2">100 <span class="text-sm font-normal text-slate-500">คน</span></div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h3 class="font-semibold text-slate-800">ประวัติการเช็คชื่อล่าสุด</h3>
                <button class="text-sm bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded flex items-center transition">
                    ⬇️ Export Excel
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-sm">
                            <th class="py-3 px-6 font-medium">เวลา</th>
                            <th class="py-3 px-6 font-medium">รหัสนักเรียน</th>
                            <th class="py-3 px-6 font-medium">ระดับชั้น</th>
                            <th class="py-3 px-6 font-medium">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-slate-700 text-sm divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // ตรวจสอบสิทธิ์ก่อน ถ้ายังไม่ล็อคอินให้เด้งกลับไปหน้า index
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'index.html';
        }

        // แสดงชื่อครูบน Navbar
        document.getElementById('displayTeacherName').textContent = 'คุณครู: ' + localStorage.getItem('teacherName');

        // ฟังก์ชันออกจากระบบ
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // ตัวแปรจำลองนับจำนวน
        let present = 0;
        let absent = 100;

        // ดักจับการกด Enter ที่ช่อง Input
        const inputElement = document.getElementById('studentInput');
        const statusElement = document.getElementById('checkinStatus');
        const tableBody = document.getElementById('tableBody');

        inputElement.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const studentId = this.value.trim();
                
                if (studentId !== "") {
                    // จำลองการอัปเดตหน้าจอ (เมื่อมี Backend ตรงนี้จะรอ Response จาก Google Script)
                    statusElement.textContent = `✅ บันทึกรหัส ${studentId} สำเร็จ!`;
                    
                    // อัปเดตตัวเลข
                    present++;
                    absent--;
                    document.getElementById('presentCount').innerHTML = `${present} <span class="text-sm font-normal text-slate-500">คน</span>`;
                    document.getElementById('absentCount').innerHTML = `${absent} <span class="text-sm font-normal text-slate-500">คน</span>`;

                    // เพิ่มข้อมูลลงในตารางแถวแรก
                    const timeNow = new Date().toLocaleTimeString('th-TH');
                    const newRow = `
                        <tr class="hover:bg-slate-50">
                            <td class="py-3 px-6">${timeNow}</td>
                            <td class="py-3 px-6 font-semibold text-blue-600">${studentId}</td>
                            <td class="py-3 px-6">ป.X/X</td>
                            <td class="py-3 px-6"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">มาเรียน</span></td>
                        </tr>
                    `;
                    tableBody.insertAdjacentHTML('afterbegin', newRow);

                    // เคลียร์ช่องให้พร้อมยิง/พิมพ์คนต่อไป
                    this.value = '';
                    
                    // ลบข้อความสถานะหลังผ่านไป 2 วินาที
                    setTimeout(() => statusElement.textContent = '', 2000);
                }
            }
        });
    </script>
</body>
</html>
