<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK School - เข้าสู่ระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center relative overflow-hidden">

    <div id="loginContainer" class="bg-white p-10 rounded-2xl shadow-xl max-w-md w-full border border-slate-100 relative z-10 transition-all duration-500">
        <div class="absolute top-0 left-0 w-full h-2 bg-blue-950"></div>
        <div class="text-center mb-10">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-teal-50 text-teal-600 mb-4"><i class="fa-solid fa-school text-3xl"></i></div>
            <h1 class="text-3xl font-extrabold text-blue-950">ยินดีต้อนรับ</h1>
            <p class="text-sm text-slate-500 mt-2 font-medium">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-blue-950 mb-1.5">ชื่อผู้ใช้งาน</label>
                <input type="text" id="username" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-400 focus:border-teal-500 outline-none transition font-medium" placeholder="เช่น admin">
            </div>
            <div>
                <label class="block text-sm font-semibold text-blue-950 mb-1.5">รหัสผ่าน</label>
                <input type="password" id="password" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-400 focus:border-teal-500 outline-none transition font-medium" placeholder="••••••••">
            </div>
            <p id="errorMessage" class="text-red-600 text-sm hidden text-center font-semibold bg-red-50 py-2 rounded-lg"></p>
            <button type="submit" id="submitBtn" class="w-full bg-blue-950 hover:bg-teal-700 text-white font-bold py-3.5 rounded-xl transition duration-300 shadow-md flex justify-center items-center">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <div id="successOverlay" class="fixed inset-0 bg-slate-50/95 backdrop-blur-md z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-700">
        <div class="transform scale-75 opacity-0 transition-all duration-700 delay-300" id="profilePopup">
            <div class="relative w-40 h-40 mx-auto mb-6">
                <img id="userPhoto" src="" class="w-full h-full object-cover rounded-full border-8 border-white shadow-2xl">
                <div class="absolute bottom-0 right-0 bg-green-500 text-white p-3 rounded-full shadow-lg border-4 border-white"><i class="fa-solid fa-check text-xl"></i></div>
            </div>
            <h2 id="userName" class="text-4xl font-bold text-blue-950 text-center mb-2"></h2>
            <p id="userRole" class="text-lg text-teal-600 font-semibold text-center mb-8 bg-teal-50 inline-block px-6 py-2 rounded-full mx-auto"></p>
            <div class="flex items-center justify-center space-x-3 text-slate-500 font-medium">
                <i class="fa-solid fa-circle-notch fa-spin text-xl text-blue-500"></i>
                <span>กำลังพาท่านไปที่ห้องทำงาน...</span>
            </div>
        </div>
    </div>

    <script>
        // ==============================================================
        // 🛑 นำ Web App URL อันใหม่ที่ Deploy เสร็จแล้ว มาวางที่นี่ด้วยครับ 🛑
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbzYzOzBAAqteJh-S-lI1y1wP6wxnUbD-ZTMUBZelzCikkFeS8GsbSNYNvcl_rKEHY7q/exec'; 
        // ==============================================================

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMessage');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังตรวจสอบ...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            fetch(scriptUrl, { method: 'POST', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify({action: 'login', username: user, password: pass}) })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    // 📌 1. บันทึกข้อมูลที่ถูกต้อง ส่งไปให้หน้า Dashboard
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    // 👉 สิ่งที่เพิ่มเข้ามา: บันทึก Username ไว้ใช้ตอนเปลี่ยนรหัสผ่าน
                    localStorage.setItem('tUsername', user); 
                    
                    localStorage.setItem('tName', data.name);
                    localStorage.setItem('tRole', data.role);
                    localStorage.setItem('tGrade', data.grade);
                    
                    // บันทึกรหัสผ่านไว้ใช้ยืนยันตอนกดลบข้อมูล
                    localStorage.setItem('tPassword', pass); 

                    const pic = data.photoUrl || `https://ui-avatars.com/api/?name=${data.name}&background=0D9488&color=fff&size=200`;
                    localStorage.setItem('tPhoto', pic);

                    // 2. จัดการแอนิเมชัน
                    document.getElementById('loginContainer').classList.add('scale-95', 'opacity-0');
                    document.getElementById('userPhoto').src = pic;
                    document.getElementById('userName').textContent = data.name;
                    document.getElementById('userRole').textContent = data.role === 'Admin' ? 'ผู้ดูแลระบบ (Admin)' : `ครูประจำชั้น ${data.grade}`;
                    
                    const overlay = document.getElementById('successOverlay');
                    const popup = document.getElementById('profilePopup');
                    overlay.classList.remove('opacity-0', 'pointer-events-none');
                    
                    setTimeout(() => {
                        popup.classList.remove('scale-75', 'opacity-0');
                        popup.classList.add('scale-100', 'opacity-100');
                    }, 100);

                    // 3. เด้งไป Dashboard
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2500);

                } else {
                    errorMsg.textContent = "❌ " + data.message;
                    errorMsg.classList.remove('hidden');
                    btn.innerHTML = 'เข้าสู่ระบบ';
                    btn.disabled = false;
                }
            })
            .catch(() => {
                errorMsg.textContent = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์";
                errorMsg.classList.remove('hidden');
                btn.innerHTML = 'เข้าสู่ระบบ';
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
