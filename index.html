<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อนักเรียน - เข้าสู่ระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">ระบบเช็คชื่อนักเรียน</h1>
            <p class="text-sm text-slate-500 mt-2">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="เช่น teacher_a">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน (Password)</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="••••••••">
            </div>

            <p id="errorMessage" class="text-red-500 text-sm hidden text-center">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง!</p>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.undefined; // ป้องกันการรีเฟรชหน้า
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // จำลองการตรวจสอบ Login (เมื่อต่อ Backend จะต้องยิง fetch ไปที่ Google Script แทน)
            if (user !== "" && pass !== "") {
                // เก็บข้อมูลการล็อคอินจำลองไว้ในเบราว์เซอร์
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('teacherName', user);
                localStorage.setItem('allowedGrades', 'ป.1-ป.6'); // สมมติว่าเป็น Admin ดูได้หมด
                
                // เปลี่ยนหน้าไปที่ Dashboard
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMessage').classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
