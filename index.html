<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อนักเรียน - เข้าสู่ระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center">

    <div class="bg-white p-10 rounded-2xl shadow-xl max-w-md w-full border border-slate-100 relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-blue-950"></div>
        
        <div class="text-center mb-10">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-teal-50 text-teal-600 mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-9 h-9">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.9-4.414c.376.023.75.05 1.124.08 1.131.094 1.976 1.057 1.976 2.192V16.5A2.25 2.25 0 0118 18.75h-2.25m-7.5-10.5H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V18.75m-7.5-10.5v6.375c0 .621.504 1.125 1.125 1.125h9.375m-8.25-3l1.5 1.5 3-3.75" />
              </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-blue-950">ยินดีต้อนรับ</h1>
            <p class="text-sm text-slate-500 mt-2 font-medium">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-blue-950 mb-1.5">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-400 focus:border-teal-500 outline-none transition font-medium"
                    placeholder="เช่น woody">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-blue-950 mb-1.5">รหัสผ่าน (Password)</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-400 focus:border-teal-500 outline-none transition font-medium"
                    placeholder="••••••••">
            </div>

            <p id="errorMessage" class="text-red-600 text-sm hidden text-center font-semibold bg-red-50 py-2 rounded-lg">
                ❌ ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง!
            </p>

            <button type="submit" 
                class="w-full bg-blue-950 hover:bg-teal-700 text-white font-bold py-3.5 rounded-xl transition duration-300 shadow-md">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <script>
        // ==========================================
        // ส่วนกำหนดรหัสผ่านจำลอง (ฝังไว้ในโค้ด)
        // ==========================================
        const correctUsername = 'woody';
        const correctPassword = '002304';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // ป้องกันการรีเฟรชหน้า
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMessage');

            // --- ขั้นตอนตรวจสอบรหัสผ่าน ---
            if (user === correctUsername && pass === correctPassword) {
                // ล็อคอินสำเร็จ: เก็บข้อมูลจำลองไว้ในเบราว์เซอร์
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('teacherName', 'คุณครูวู้ดดี้ (Admin)');
                localStorage.setItem('allowedGrades', 'ป.1-ป.6'); // สมมติว่า Admin ดูได้หมด
                
                // เปลี่ยนหน้าไปที่ Dashboard
                window.location.href = 'dashboard.html';
            } else {
                // ล็อคอินไม่สำเร็จ: แสดงข้อความแจ้งเตือน
                errorMsg.classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
