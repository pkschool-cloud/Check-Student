<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อนักเรียน - เข้าสู่ระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">ระบบเช็คชื่อนักเรียน</h1>
            <p class="text-sm text-slate-500 mt-2">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="เช่น teacher_a">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน (Password)</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="••••••••">
            </div>

            <p id="errorMessage" class="text-red-500 text-sm hidden text-center">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง!</p>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

  <script>
        // ==========================================
        // นำ URL ของ Google Script มาใส่ (ใช้ URL เดียวกับหน้า Dashboard)
        // ==========================================
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbynsBBewRWvZMKmqz8hF4xW3ILXkFjLq-vfFltXwzazgm6bkllhHZh9XXW_bFVVPSvt/exec';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // ป้องกันการรีเฟรชหน้า
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const submitBtn = this.querySelector('button[type="submit"]');
            const errorMsg = document.getElementById('errorMessage');

            if (user !== "" && pass !== "") {
                // เปลี่ยนข้อความปุ่มเพื่อบอกผู้ใช้ว่ากำลังโหลดข้อมูล
                const originalBtnText = submitBtn.textContent;
                submitBtn.textContent = 'กำลังตรวจสอบ...';
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
                errorMsg.classList.add('hidden');

                // ส่งข้อมูลไปตรวจสอบที่ Google Script (Backend)
                fetch(scriptUrl, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        username: user,
                        password: pass
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        // ล็อคอินสำเร็จ: เก็บข้อมูล "ของจริง" จาก Sheet ไว้ในเบราว์เซอร์
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('teacherName', data.username); 
                        localStorage.setItem('role', data.role); // เก็บสิทธิ์ว่าเป็น Admin หรือ Teacher
                        localStorage.setItem('allowedGrades', data.allowedGrades); // เก็บชั้นที่ได้รับอนุญาต
                        
                        // เปลี่ยนหน้าไปที่ Dashboard
                        window.location.href = 'dashboard.html';
                    } else {
                        // ล็อคอินไม่สำเร็จ: แสดงข้อความแจ้งเตือนที่ได้จาก Backend
                        errorMsg.textContent = data.message || 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง!';
                        errorMsg.classList.remove('hidden');
                        
                        // คืนสภาพปุ่มกลับมาให้กดใหม่ได้
                        submitBtn.textContent = originalBtnText;
                        submitBtn.disabled = false;
                        submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                    }
                })
                .catch(error => {
                    // กรณีเน็ตหลุด หรือยิง URL ผิด
                    errorMsg.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย ตรวจสอบ URL หรืออินเทอร์เน็ตของคุณ';
                    errorMsg.classList.remove('hidden');
                    
                    submitBtn.textContent = originalBtnText;
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                });
            }
        });
    </script>

</body>
</html>
