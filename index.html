<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK School - เข้าสู่ระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> 
        body { 
            font-family: 'Prompt', sans-serif; 
            background: linear-gradient(-45deg, #e0e7ff, #c7d2fe, #ede9fe, #f3e8ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ของตกแต่งลอยไปมาเบื้องหลัง (Floating Icons) */
        .float-icon { position: absolute; opacity: 0.15; z-index: -1; animation: float 6s ease-in-out infinite; }
        .float-1 { top: 10%; left: 10%; font-size: 5rem; animation-delay: 0s; color: #4f46e5; }
        .float-2 { top: 70%; left: 15%; font-size: 6rem; animation-delay: 2s; color: #db2777; }
        .float-3 { top: 20%; right: 10%; font-size: 4.5rem; animation-delay: 1s; color: #059669; }
        .float-4 { bottom: 15%; right: 15%; font-size: 7rem; animation-delay: 3s; color: #ea580c; }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        /* แอนิเมชันสลับหน้าต่าง */
        .fade-out { animation: fadeOut 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeOut { 
            0% { opacity: 1; transform: scale(1); } 
            100% { opacity: 0; transform: scale(0.9); pointer-events: none; visibility: hidden; display: none;} 
        }
        @keyframes fadeIn { 
            0% { opacity: 0; transform: scale(0.8) translateY(20px); } 
            100% { opacity: 1; transform: scale(1) translateY(0); } 
        }

        /* วงแหวนหมุนรอบรูปโปรไฟล์ */
        .profile-ring {
            background: conic-gradient(from 0deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6);
            animation: spin 3s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* รูปโปรไฟล์เด้งดึ๋ง */
        .profile-pop { animation: popBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; transform: scale(0); }
        @keyframes popBounce { 
            0% { opacity: 0; transform: scale(0.3); } 
            100% { opacity: 1; transform: scale(1); } 
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center relative">

    <i class="fa-solid fa-graduation-cap float-icon float-1"></i>
    <i class="fa-solid fa-book-open float-icon float-2"></i>
    <i class="fa-solid fa-dice float-icon float-3"></i>
    <i class="fa-solid fa-paintbrush float-icon float-4"></i>

    <div id="mainContainer" class="glass-card p-10 rounded-[2.5rem] max-w-md w-full relative z-10 mx-4 transition-all duration-500 min-h-[450px] flex flex-col justify-center">
        
        <div id="loginSection" class="w-full">
            <div class="text-center mb-8">
                <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 text-white mb-5 shadow-lg shadow-blue-500/30">
                    <i class="fa-solid fa-school text-4xl"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Pakang School</h1>
                <p class="text-sm text-slate-500 mt-2 font-medium">เข้าสู่ระบบเพื่อจัดการชั้นเรียนของคุณครู</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">ชื่อผู้ใช้งาน</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-user text-slate-400"></i>
                        </div>
                        <input type="text" id="username" required 
                            class="w-full pl-11 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-bold text-slate-700 placeholder:font-medium placeholder:text-slate-400" 
                            placeholder="Username">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">รหัสผ่าน</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-400"></i>
                        </div>
                        <input type="password" id="password" required 
                            class="w-full pl-11 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-bold text-slate-700 placeholder:font-medium placeholder:text-slate-400 tracking-wider" 
                            placeholder="••••••••">
                    </div>
                </div>
                
                <div id="errorMessage" class="hidden bg-rose-50 border border-rose-100 text-rose-600 px-4 py-3 rounded-xl text-sm font-bold text-center flex items-center justify-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i> <span id="errorText">รหัสผ่านไม่ถูกต้อง!</span>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold text-lg py-4 rounded-2xl shadow-lg shadow-blue-500/30 transform transition-all hover:-translate-y-1 active:translate-y-0 flex justify-center items-center gap-2 mt-4">
                    เข้าสู่ระบบ <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>

        <div id="welcomeSection" class="hidden w-full flex-col items-center text-center justify-center py-4">
            
            <div class="relative w-36 h-36 mx-auto mb-6 profile-pop" id="profileAnim">
                <div class="absolute inset-0 rounded-full profile-ring blur-[2px]"></div>
                <div class="absolute inset-[4px] bg-white rounded-full p-1 z-10">
                    <img id="userPhoto" src="" class="w-full h-full object-cover rounded-full shadow-inner">
                </div>
                <div class="absolute bottom-0 right-0 bg-emerald-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg border-4 border-white z-20 transform scale-0 transition-transform duration-500 delay-500" id="checkAnim">
                    <i class="fa-solid fa-check text-xl"></i>
                </div>
            </div>

            <h2 class="text-xl font-bold text-slate-500 mb-1 opacity-0 transform translate-y-4 transition-all duration-500 delay-[600ms]" id="textAnim1">ยินดีต้อนรับกลับมา</h2>
            <h1 id="userName" class="text-3xl font-black text-slate-800 mb-3 tracking-tight opacity-0 transform translate-y-4 transition-all duration-500 delay-[700ms]">...</h1>
            
            <div class="opacity-0 transform translate-y-4 transition-all duration-500 delay-[800ms]" id="textAnim2">
                <span id="userRole" class="inline-flex items-center gap-1.5 px-4 py-1.5 bg-indigo-50 text-indigo-600 font-bold rounded-full border border-indigo-100 shadow-sm text-sm">
                    <i class="fa-solid fa-chalkboard-user"></i> ...
                </span>
            </div>

            <div class="mt-8 text-slate-400 font-medium flex items-center justify-center gap-2 opacity-0 transition-opacity duration-500 delay-[1000ms]" id="loadingAnim">
                <i class="fa-solid fa-circle-notch fa-spin text-blue-500"></i> กำลังเตรียมห้องทำงานของคุณ...
            </div>
        </div>

    </div>

    <script>
        // ==============================================================
        // 🛑 นำ Web App URL อันใหม่ที่ Deploy เสร็จแล้ว มาวางที่นี่ครับ 🛑
        const scriptUrl = 'const SS = SpreadsheetApp.getActiveSpreadsheet();

function doPost(e) {
  let data;
  try { data = JSON.parse(e.postData.contents); } catch(err) { data = JSON.parse(e.parameter); }
  const action = data.action;
  
  try {
    if (action === 'login') return response(handleLogin(data.username, data.password));
    if (action === 'checkin') return response(handleCheckin(data.studentId, data.allowedGrade));
    if (action === 'getRecords') return response(getRecords());
    if (action === 'deleteRecord') return response(deleteRecord(data.timestampId));
    if (action === 'changePassword') return response(changePassword(data.username, data.oldPwd, data.newPwd));
    if (action === 'syncManual') return response(syncManual(data.dateStr, data.updates));
    if (action === 'addStudent') return response(addStudent(data.student));
    if (action === 'deleteStudent') return response(deleteStudent(data.studentId));
    
    return response({status: 'error', message: 'Unknown action'});
  } catch (err) {
    return response({status: 'error', message: err.toString()});
  }
}

function response(res) { return ContentService.createTextOutput(JSON.stringify(res)).setMimeType(ContentService.MimeType.JSON); }

function handleLogin(username, password) {
  const sheet = SS.getSheetByName('Users'); const data = sheet.getDataRange().getValues();
  for (let i = 1; i < data.length; i++) { if (String(data[i][0]) === String(username) && String(data[i][1]) === String(password)) return { status: 'success', name: data[i][2], role: data[i][3], grade: data[i][4], photoUrl: data[i][5] || '' }; }
  return { status: 'error', message: 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง' };
}

function changePassword(username, oldPwd, newPwd) {
  const sheet = SS.getSheetByName('Users'); const data = sheet.getDataRange().getValues();
  for (let i = 1; i < data.length; i++) { if (String(data[i][0]) === String(username) && String(data[i][1]) === String(oldPwd)) { sheet.getRange(i + 1, 2).setValue(newPwd); return { status: 'success' }; } }
  return { status: 'error', message: 'รหัสผ่านเดิมไม่ถูกต้อง' };
}

// 🔥 อัปเกรด: เช็คชื่อด้วยรหัส หรือ ชื่อบางส่วน (>= 4 ตัวอักษร)
function handleCheckin(studentInput, allowedGrade) {
  const studentSheet = SS.getSheetByName('Students'); const attendanceSheet = SS.getSheetByName('Attendance');
  const students = studentSheet.getDataRange().getValues(); 
  
  let studentInfo = null;
  let matchedId = null;
  let matchCount = 0;
  const inputStr = String(studentInput).trim();
  
  for (let i = 1; i < students.length; i++) { 
    let sId = String(students[i][0]);
    let sName = String(students[i][1]);

    // 1. ถ้ารหัสตรงเป๊ะ ให้หยุดหาเลย
    if (sId === inputStr) { 
      studentInfo = { name: sName, grade: String(students[i][2] || ''), gender: students[i][3], photoUrl: students[i][4] || '' }; 
      matchedId = sId;
      matchCount = 1;
      break; 
    }
    // 2. ถ้าค้นหาด้วยชื่อ และยาว 4 ตัวอักษรขึ้นไป
    if (inputStr.length >= 4 && sName.includes(inputStr)) {
      studentInfo = { name: sName, grade: String(students[i][2] || ''), gender: students[i][3], photoUrl: students[i][4] || '' }; 
      matchedId = sId;
      matchCount++;
    }
  }

  // ถ้าเจอคนชื่อคล้ายกันหลายคน ให้แจ้งเตือน
  if (matchCount > 1) {
    return { status: 'error', message: 'พบชื่อนักเรียนคล้ายกันหลายคน กรุณาพิมพ์ให้ยาวกว่านี้' };
  }
  
  if (studentInfo && matchCount === 1) {
    let isAllowed = (allowedGrade === 'All');
    if (!isAllowed) { 
      const allowedList = String(allowedGrade).split(',').map(g => g.trim()); 
      for (let g of allowedList) { if (studentInfo.grade.startsWith(g)) { isAllowed = true; break; } } 
    }
    if (!isAllowed) return { status: 'unauthorized', message: `คุณรับผิดชอบเฉพาะชั้น ${allowedGrade}` };

    const todayStr = Utilities.formatDate(new Date(), "Asia/Bangkok", "yyyy-MM-dd");
    const logs = attendanceSheet.getDataRange().getValues();
    
    for (let i = 1; i < logs.length; i++) {
      let rawTime = logs[i][0];
      if (!rawTime) continue;
      let rDate = new Date(rawTime);
      if (!isNaN(rDate.getTime())) {
        let rDateStr = Utilities.formatDate(rDate, "Asia/Bangkok", "yyyy-MM-dd");
        if (rDateStr === todayStr && String(logs[i][1]) === matchedId) {
           return { status: 'duplicate', message: 'นักเรียนได้ลงชื่อเข้าเรียนเรียบร้อยแล้ว', name: studentInfo.name, grade: studentInfo.grade, photoUrl: studentInfo.photoUrl };
        }
      }
    }

    attendanceSheet.appendRow([new Date(), matchedId, studentInfo.name, studentInfo.gender, studentInfo.grade]);
    return { status: 'success', name: studentInfo.name, grade: studentInfo.grade, gender: studentInfo.gender, photoUrl: studentInfo.photoUrl };
  } else {
    return { status: 'error', message: 'ไม่พบข้อมูลนักเรียนนี้ในระบบ' };
  }
}

function getRecords() {
  const attendanceData = SS.getSheetByName('Attendance').getDataRange().getValues(); 
  const studentData = SS.getSheetByName('Students').getDataRange().getValues();
  let gradeTotals = { 'All': 0 }; let allStudents = [];
  for(let i = 1; i < studentData.length; i++){ let stGrade = String(studentData[i][2] || ''); let mainGrade = stGrade.split('/')[0]; gradeTotals['All']++; gradeTotals[mainGrade] = (gradeTotals[mainGrade] || 0) + 1; allStudents.push({ id: String(studentData[i][0]), name: studentData[i][1], grade: stGrade, gender: studentData[i][3] }); }
  return { status: 'success', records: attendanceData.length > 1 ? attendanceData.slice(1) : [], gradeTotals: gradeTotals, students: allStudents };
}

function syncManual(dateStr, updates) {
  try {
    const sheet = SS.getSheetByName('Attendance'); const data = sheet.getDataRange().getValues();
    const students = SS.getSheetByName('Students').getDataRange().getValues();
    let absentIds = updates.filter(u => u.status === 'absent').map(u => String(u.id)); let rowsToDelete = [];
    for (let i = data.length - 1; i >= 1; i--) {
      if (!data[i][0]) continue; let d = new Date(data[i][0]); if(isNaN(d.getTime())) continue;
      let rDateStr = Utilities.formatDate(d, "Asia/Bangkok", "yyyy-MM-dd"); let rId = String(data[i][1]);
      if (rDateStr === dateStr && absentIds.includes(rId)) rowsToDelete.push(i + 1);
    }
    rowsToDelete.sort((a,b) => b - a).forEach(idx => sheet.deleteRow(idx));

    const freshData = sheet.getDataRange().getValues(); let presentIds = updates.filter(u => u.status === 'present').map(u => String(u.id)); let existingPresentIds = [];
    for (let i = 1; i < freshData.length; i++) {
      if (!freshData[i][0]) continue; let d = new Date(freshData[i][0]); if(isNaN(d.getTime())) continue;
      let rDateStr = Utilities.formatDate(d, "Asia/Bangkok", "yyyy-MM-dd"); if (rDateStr === dateStr) existingPresentIds.push(String(freshData[i][1]));
    }

    let todayStr = Utilities.formatDate(new Date(), "Asia/Bangkok", "yyyy-MM-dd");
    updates.forEach(u => {
      if (u.status === 'present' && !existingPresentIds.includes(String(u.id))) {
        let st = students.find(s => String(s[0]) === String(u.id));
        if (st) { let recordTime = (dateStr === todayStr) ? new Date() : new Date(dateStr + "T08:00:00+07:00"); sheet.appendRow([recordTime, String(st[0]), st[1], st[3], String(st[2]||'')]); }
      }
    });
    return { status: 'success' };
  } catch (err) { return { status: 'error', message: err.toString() }; }
}

function deleteRecord(timestampId) {
  const attendanceSheet = SS.getSheetByName('Attendance'); const data = attendanceSheet.getDataRange().getValues();
  for (let i = 1; i < data.length; i++) { if (new Date(data[i][0]).toString() === new Date(timestampId).toString()) { attendanceSheet.deleteRow(i + 1); return { status: 'success' }; } }
  return { status: 'error', message: 'ไม่พบรายการ' };
}

function addStudent(student) {
  const sheet = SS.getSheetByName('Students'); const data = sheet.getDataRange().getValues();
  for(let i = 1; i < data.length; i++) { if(String(data[i][0]) === String(student.id)) return { status: 'error', message: 'รหัสประจำตัวนี้มีอยู่ในระบบแล้ว!' }; }
  sheet.appendRow([String(student.id), student.name, student.grade, student.gender, '']);
  return { status: 'success' };
}

function deleteStudent(studentId) {
  const sheet = SS.getSheetByName('Students'); const data = sheet.getDataRange().getValues();
  for(let i = 1; i < data.length; i++) { if(String(data[i][0]) === String(studentId)) { sheet.deleteRow(i + 1); return { status: 'success' }; } }
  return { status: 'error', message: 'ไม่พบรหัสประจำตัวนี้ในระบบ' };
}'; 
        // ==============================================================

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('submitBtn');
            const errorBox = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // เปลี่ยนสถานะปุ่ม
            btn.innerHTML = '<i class="fa-solid fa-dice animate-spin text-xl"></i> กำลังค้นหาข้อมูล...';
            btn.disabled = true;
            errorBox.classList.add('hidden');

            fetch(scriptUrl, { method: 'POST', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify({action: 'login', username: user, password: pass}) })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    // 📌 1. บันทึกข้อมูลลงเครื่อง
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('tUsername', user); 
                    localStorage.setItem('tName', data.name);
                    localStorage.setItem('tRole', data.role);
                    localStorage.setItem('tGrade', data.grade);
                    localStorage.setItem('tPassword', pass); 

                    const pic = data.photoUrl || `https://ui-avatars.com/api/?name=${data.name}&background=2563EB&color=fff&size=200`;
                    localStorage.setItem('tPhoto', pic);

                    // 📌 2. เล่นแอนิเมชัน (สลับหน้าต่าง)
                    const loginSec = document.getElementById('loginSection');
                    const welcomeSec = document.getElementById('welcomeSection');
                    
                    // เฟดฟอร์มล็อคอินออก
                    loginSec.classList.add('fade-out');

                    setTimeout(() => {
                        loginSec.classList.add('hidden');
                        loginSec.classList.remove('fade-out');
                        
                        // เซ็ตข้อมูลลงการ์ดต้อนรับ
                        document.getElementById('userPhoto').src = pic;
                        document.getElementById('userName').textContent = data.name;
                        document.getElementById('userRole').innerHTML = data.role === 'Admin' ? '<i class="fa-solid fa-crown mr-1"></i> ผู้ดูแลระบบ (Admin)' : `<i class="fa-solid fa-chalkboard-user mr-1"></i> ครูประจำชั้น ${data.grade}`;
                        
                        // โชว์การ์ดต้อนรับและเริ่มแอนิเมชัน
                        welcomeSec.classList.remove('hidden');
                        welcomeSec.classList.add('fade-in');

                        // เล่น Effect ย่อยด้านใน
                        document.getElementById('checkAnim').classList.remove('scale-0');
                        document.getElementById('checkAnim').classList.add('scale-100');
                        
                        ['textAnim1', 'userName', 'textAnim2', 'loadingAnim'].forEach(id => {
                            document.getElementById(id).classList.remove('opacity-0', 'translate-y-4');
                            document.getElementById(id).classList.add('opacity-100', 'translate-y-0');
                        });

                    }, 500); // รอฟอร์มหายไป 0.5 วิ

                    // 📌 3. วาร์ปไปหน้า Dashboard (รวมเวลาโชว์แอนิเมชัน 3.5 วินาที)
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 3500);

                } else {
                    errorText.textContent = data.message;
                    errorBox.classList.remove('hidden');
                    // ใส่ Effect สั่นให้กล่อง Error
                    errorBox.style.animation = 'none';
                    setTimeout(() => { errorBox.style.animation = 'shake 0.4s ease-in-out'; }, 10);
                    
                    btn.innerHTML = 'เข้าสู่ระบบ <i class="fa-solid fa-arrow-right"></i>';
                    btn.disabled = false;
                }
            })
            .catch(() => {
                errorText.textContent = "เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย";
                errorBox.classList.remove('hidden');
                btn.innerHTML = 'เข้าสู่ระบบ <i class="fa-solid fa-arrow-right"></i>';
                btn.disabled = false;
            });
        });
    </script>
